spring:
  application:
    name: ranger-survivor

  datasource:
    url: jdbc:h2:mem:rangersurvivor;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Dev uses the in-memory H2 schema Hibernate builds on boot. Flyway owns the
  # prod (Postgres) schema only, so it stays off here.
  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${PORT:8080}
  # Empty by default (root, e.g. on Render). Set APP_BASE_PATH=/ranger to serve under
  # a subpath behind the Tailscale Funnel path mapping.
  servlet:
    context-path: ${APP_BASE_PATH:}

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # Flyway owns the schema. Hibernate only validates the entity mapping against
  # it on boot and never mutates the live database.
  flyway:
    enabled: true
    locations: classpath:db/migration
    # The shared database predates Flyway (its table was created by the old
    # ddl-auto: update). Baseline an existing non-empty schema instead of failing,
    # marking V1 as already applied. Harmless on a fresh database.
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false
